name: Daily Travel Shorts - Generate Only

# Disabled schedule: use youtube-auto-upload.yml for production runs.
on:
  workflow_dispatch:

env:
  TZ: 'Asia/Seoul'

jobs:
  generate-travel-short:
    name: Generate travel short (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install requests python-dotenv

    - name: Install FFmpeg
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg
        ffmpeg -version

    - name: Install subtitle fonts
      run: |
        sudo apt-get install -y fonts-nanum fonts-nanum-coding
        fc-cache -fv

    - name: Generate travel short from Pexels
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: |
        python3 scripts/generate_with_pexels.py

    - name: Upload generated files as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: travel-shorts-${{ github.run_number }}
        path: |
          output/*.mp4
          output/*_metadata.json
        retention-days: 30

    - name: Job summary
      if: always()
      run: |
        echo "================================"
        echo "Travel short generation finished"
        echo "================================"
        echo "Run number: ${{ github.run_number }}"
        echo "Status: ${{ job.status }}"
        echo "Time: $(date)"
        echo "================================"
