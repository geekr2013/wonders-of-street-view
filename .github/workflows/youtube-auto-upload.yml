name: Daily Travel Shorts - YouTube Upload

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 09:00 KST
  workflow_dispatch:

env:
  TZ: 'Asia/Seoul'

jobs:
  generate-and-upload:
    name: Generate and upload travel short
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install requests python-dotenv
        pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Install FFmpeg
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg

    - name: Install subtitle fonts
      run: |
        sudo apt-get install -y fonts-nanum fonts-nanum-coding
        fc-cache -fv

    - name: Clean old files
      run: |
        python3 scripts/cleanup_old_videos.py

    - name: Generate video and upload to YouTube
      id: upload
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
      run: |
        python3 scripts/full_auto_youtube.py

    - name: Remove uploaded local mp4 files
      if: success()
      run: |
        echo "Upload completed. Removing local video files..."
        rm -f output/*.mp4
        echo "MP4 cleanup complete"
        ls -lh output/ || echo "output directory is empty"

    - name: Commit cleanup changes
      if: success()
      run: |
        git config user.name "Travel Shorts Studio"
        git config user.email "cogurrl@gmail.com"
        git add -A
        git diff-index --quiet HEAD || git commit -m "chore: cleanup old generated files (${GITHUB_RUN_NUMBER})"
        git push || echo "No changes to commit"

    - name: Upload metadata artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: travel-shorts-metadata-${{ github.run_number }}
        path: |
          output/*_metadata.json
          logs/cleanup_*.json
        retention-days: 7

    - name: Show storage usage
      if: always()
      run: |
        echo "Storage usage summary:"
        du -sh . 2>/dev/null || echo "total: N/A"
        du -sh output/ 2>/dev/null || echo "output: 0 MB (clean)"
        du -sh logs/ 2>/dev/null || echo "logs: N/A"
        echo ""
        echo "GitHub Free repository limit: 500MB"
        echo "Artifacts limit: 2GB (separate from repository storage)"

    - name: Job summary
      if: always()
      run: |
        echo "================================"
        echo "Daily travel short workflow finished"
        echo "================================"
        echo "Run number: ${{ github.run_number }}"
        echo "Status: ${{ job.status }}"
        echo "Time: $(date)"
        echo "================================"
